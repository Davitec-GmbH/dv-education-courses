<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Default" />
<f:section name="content">
    <h1><f:translate key="LLL:EXT:dv_education_courses/Resources/Private/Language/locallang.xlf:event.list.headline" /></h1>
    <f:if condition="{events}">
        <f:then>
            <ul class="event-list" role="list">
                <f:for each="{events}" as="event">
                    <li><f:render partial="Event/Card" arguments="{event: event, settings: settings}" /></li>
                </f:for>
            </ul>
        </f:then>
        <f:else>
            <p><f:translate key="LLL:EXT:dv_education_courses/Resources/Private/Language/locallang.xlf:event.list.noResults" /></p>
        </f:else>
    </f:if>
</f:section>
</html>
